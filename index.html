  <!-- =========================
GLOBAL STYLE
========================= -->

  <style>
    :root {
      --bg: #020617;
      --text: #f8fafc;
      --accent: #38bdf8;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    /* ======================
APP REVEAL
====================== */

    #root {
      opacity: 0;
      transform: translateY(10px);
      transition: all .6s ease;
    }

    #root.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ======================
LOADER BACKGROUND
====================== */

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;

      background:
        radial-gradient(circle at 20% 20%, #0f172a, transparent),
        radial-gradient(circle at 80% 80%, #020617, #000);
    }

    /* ======================
LOGO
====================== */

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .logo span {
      color: var(--accent);
    }

    /* ======================
SPINNER
====================== */

    .spinner {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 4px solid #1e293b;
      border-top: 4px solid var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ======================
PROGRESS BAR
====================== */

    .progress {
      width: 220px;
      height: 4px;
      background: #1e293b;
      border-radius: 20px;
      margin-top: 25px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      animation: load 2s ease forwards;
    }

    @keyframes load {
      to {
        width: 100%;
      }
    }

    /* ======================
LOADING TEXT
====================== */

    .loading-text {
      margin-top: 15px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: .4
      }

      50% {
        opacity: 1
      }

      100% {
        opacity: .4
      }
    }

    noscript {
      display: block;
      padding: 20px;
      background: black;
      color: red;
      text-align: center;
    }
  </style>

<body>

  <noscript>

  <!-- =========================
LOADER
========================= -->

  <div id="loader">

    <div class="logo">
      Ratnakar<span>.</span>
    </div>

    <div class="spinner"></div>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <div class="loading-text">
      Initializing Portfolio...
    </div>

  </div>

  <!-- =========================
REACT ROOT
========================= -->

  <div id="root"></div>

  <!-- =========================
REACT ENTRY
========================= -->

  <script type="module" src="/src/index.jsx"></script>

  <!-- =========================
LOADER SCRIPT
========================= -->

  <script>

    window.addEventListener("load", () => {

      const loader = document.getElementById("loader")
      const root = document.getElementById("root")

      loader.style.opacity = "0"

      setTimeout(() => {

        loader.style.display = "none"
        root.classList.add("show")

      }, 600)

    })

  </script>

</body>
